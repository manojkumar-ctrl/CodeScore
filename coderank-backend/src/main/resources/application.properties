spring.application.name=coderank-backend
server.port=8080

# Datasource — values come from environment variables
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# CORS — comma-separated list of allowed origins
app.cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:3000}

# External API URLs
app.api.github-url=${GITHUB_API_URL:https://api.github.com}
app.api.leetcode-url=${LEETCODE_API_URL:https://leetcode.com}
app.api.codeforces-url=${CODEFORCES_API_URL:https://codeforces.com/api}

# Fix for Supabase PgBouncer prepared statement issues
spring.datasource.hikari.data-source-properties.prepareThreshold=0
spring.datasource.hikari.maximum-pool-size=5

# Redis (Cache Aside Pattern)
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# Cache TTL configuration (seconds)
spring.cache.redis.time-to-live=600000